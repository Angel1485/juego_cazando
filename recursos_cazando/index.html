<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NEON CAT // CAZADOR</title>
  <link rel="stylesheet" href="cazando.css">
</head>
<body onload="iniciarJuego();">
 
  <div class="container">
 
    <header>
      <div class="title-block">
        <div class="glitch-wrap">
          <h1 class="glitch" data-text="NEON CAT">NEON CAT</h1>
        </div>
        <p class="subtitle">// CAZADOR v2.0 //</p>
      </div>
    </header>
 
    <div class="game-layout">
 
      <!-- Panel izquierdo -->
      <div class="side-panel left-panel">
        <div class="stat-card">
          <div class="stat-label">PUNTOS</div>
          <div class="stat-value" id="spanPuntaje">000</div>
          <div class="stat-bar"><div class="stat-fill" id="puntajeBar"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">TIEMPO</div>
          <div class="stat-value" id="spanTiempo">010</div>
          <div class="stat-bar"><div class="stat-fill time-fill" id="tiempoBar"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">NIVEL</div>
          <div class="stat-value" id="spanNivel">01</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">VIDAS</div>
          <div class="lives" id="vidasDisplay">
            <span class="life">♥</span><span class="life">♥</span><span class="life">♥</span>
          </div>
        </div>
      </div>
 
      <!-- Canvas central -->
      <div class="canvas-wrap">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <canvas id="areaJuego" width="400" height="400"></canvas>
        <div id="overlay" class="overlay hidden">
          <div class="overlay-content">
            <div id="overlayTitle" class="overlay-title"></div>
            <div id="overlayScore" class="overlay-score"></div>
            <button class="btn-play" onclick="reiniciarJuego()">▶ REINICIAR</button>
          </div>
        </div>
      </div>
 
      <!-- Panel derecho -->
      <div class="side-panel right-panel">
        <div class="stat-card">
          <div class="stat-label">RÉCORD</div>
          <div class="stat-value" id="spanRecord">000</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">COMBO</div>
          <div class="stat-value" id="spanCombo">x1</div>
        </div>
        <div class="stat-card log-card">
          <div class="stat-label">LOG</div>
          <div id="logPanel" class="log-panel"></div>
        </div>
      </div>
 
    </div>
 
    <!-- Controles -->
    <div class="controles">
      <div class="dpad">
        <button class="btn-dir" id="btnArriba">▲</button>
        <div class="dpad-row">
          <button class="btn-dir" id="btnIzquierda">◀</button>
          <div class="dpad-center">✛</div>
          <button class="btn-dir" id="btnDerecha">▶</button>
        </div>
        <button class="btn-dir" id="btnAbajo">▼</button>
      </div>
    </div>
 
    <!-- Botones de acción -->
    <div class="action-btns">
      <button class="btn-action" id="btnReiniciar">↺ REINICIAR</button>
      <button class="btn-action" id="btnPausa" onclick="togglePausa()">⏸ PAUSA</button>
      <button class="btn-action" id="btnVelocidad" onclick="cambiarVelocidad()">⚡ VELOCIDAD: NORMAL</button>
      <a href="https://menu-seven-mu.vercel.app/" class="btn-action">VOLVER AL MENU</a>
    </div>
 
    <p id="mensaje" class="mensaje"></p>
    <p class="autor">// AUTOR: ANGEL SARANGO //</p>
  </div>
 
  <script src="cazando.js"></script>
</body>
</html>
